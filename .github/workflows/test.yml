name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --disable-pip-version-check -e . ruff==0.15.22
      - run: python -m ruff check src tests
      - run: python -m unittest discover -v
      - run: bash -n install.sh tests/integration_xray.sh tests/test_installer_modes.sh
      - run: shellcheck --external-sources --severity=style install.sh tests/integration_xray.sh tests/test_installer_modes.sh
      - run: bash tests/test_installer_modes.sh
      - if: matrix.python-version == '3.12'
        run: bash tests/integration_xray.sh
      - name: Public-tree secret and private-topology guard
        run: |
          ! grep -RInE '[K]Cloud|mobile-[k]cloud|150[.]158[.]13[.]40|8771876423[:]|BEGIN [A-Z0-9 ]*[P]RIVATE KEY' \
            --exclude-dir=.git .
